<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpareHub - Payment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .payment-container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            text-align: center;
            color: #333;
        }
        .payment-option {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .payment-option:hover {
            background-color: #f9f9f9;
        }
        .payment-option img {
            width: 50px;
            height: 50px;
            margin-right: 20px;
            object-fit: contain;
        }
        .payment-option h3 {
            margin: 0;
            font-size: 1.2em;
            color: #555;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <a href="javascript:window.history.back();" class="back-link">← Back to Cart</a>
        <h1>Choose a Payment Method</h1>
        <div class="payment-options">
            <div class="payment-option" onclick="window.location.href='netbankpay.html'">
                <img src="../images/netbanking.png" alt="Netbanking Icon">
                <h3>Netbanking</h3>
            </div>
            <div class="payment-option" >
                <img src="../images/upi.png" alt="UPI Icon" onclick="selectPayment('UPI')">
                <h3>UPI</h3>
            </div>
            <div class="payment-option" onclick="window.location.href='cod.html'">
                <img src="../images/cod.png" alt="Cash on Delivery Icon">
                <h3>Cash on Delivery</h3>
            </div>
        </div>
    </div>
    <script>
        function selectPayment(method) {
            alert(`You have selected ${method}. Proceeding to checkout...`);
            // Here you would add the logic to process the payment based on the selected method.
            // For example, redirect to a new page or show a payment form.
        }
    </script>
</body>
</html>
